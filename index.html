<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>排班工具</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toast-container" id="toasts"></div>

  <!-- 登录/注册 -->
  <div class="view" id="view-login">
    <div class="login-card">
      <div class="login-brand">排班工具</div>
      <h2 id="authTitle">欢迎登录</h2>
      <p id="authDesc">请使用邮箱和密码访问您的店铺</p>

      <div class="form-group">
        <label>电子邮箱</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password"/>
      </div>

      <div id="loginActions">
        <button class="btn btn-primary btn-block" onclick="Auth.handleAuth('login')">登录</button>
        <p class="auth-switch">还没有账号？<a href="javascript:void(0)" onclick="UI.toggleAuthMode('signup')">立即注册</a></p>
      </div>

      <div id="signupActions" class="hidden">
        <div class="form-group">
          <label>邀请码 <span class="text-red">*</span></label>
          <input type="text" id="signupInviteCode" placeholder="6位邀请码" maxlength="6" oninput="UI.checkInviteCode()"/>
          <span id="inviteCodeHint" class="hint hidden"></span>
        </div>
        <div class="form-group hidden" id="newShopNameGroup">
          <label>店铺名称</label>
          <input type="text" id="signupShopName" placeholder="为您的新店铺取名"/>
        </div>
        <div class="form-group">
          <label>性别</label>
          <select id="signupGender">
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <button class="btn btn-primary btn-block" onclick="Auth.handleAuth('signup')">创建账号</button>
        <p class="auth-switch">已有账号？<a href="javascript:void(0)" onclick="UI.toggleAuthMode('login')">返回登录</a></p>
      </div>
    </div>
  </div>

  <!-- 店铺主页 (JS 动态渲染) -->
  <div class="view" id="view-shop">
    <header class="app-header">
      <h1 id="shopTitle">加载中...</h1>
      <div class="header-actions">
        <button class="header-btn" onclick="location.hash='#/settings'" title="设置">⚙</button>
      </div>
    </header>
    <div id="shopContent" class="main-content"></div>
    <nav class="bottom-tabs" id="shopNav" style="display:none">
      <button class="bottom-tab active" onclick="UI.switchEmpTab('avail')">
        <span class="tab-icon">📋</span>选班次
      </button>
      <button class="bottom-tab" onclick="UI.switchEmpTab('schedule')">
        <span class="tab-icon">📅</span>班表
      </button>
      <button class="bottom-tab" onclick="UI.switchEmpTab('messages')">
        <span class="tab-icon">💬</span>消息
        <span class="badge-dot" id="notifBadge" style="display:none">0</span>
      </button>
    </nav>
  </div>

  <!-- 个人设置 -->
  <div class="view" id="view-settings">
    <header class="app-header">
      <button class="header-btn" onclick="history.back()">←</button>
      <h1>个人设置</h1>
      <div></div>
    </header>
    <div class="main-content">
      <div class="card">
        <div class="form-group">
          <label>我的姓名</label>
          <input type="text" id="profileName" placeholder="请输入姓名"/>
        </div>
        <div class="form-group">
          <label>通知邮箱</label>
          <input type="email" id="profileEmail" placeholder="用于接收排班通知"/>
        </div>
        <button class="btn btn-primary btn-block" onclick="Onboarding.updateProfile()">保存设置</button>
      </div>
      <div class="card hidden" id="leaveShopCard">
        <p class="card-hint">退出后可重新输入邀请码加入其他店铺。</p>
        <button class="btn btn-danger btn-block" onclick="ShopMgmt.leaveShop()">退出当前店铺</button>
      </div>
      <div class="card">
        <button class="btn btn-danger btn-block" onclick="Auth.logout()">退出登录</button>
      </div>
      <div class="settings-meta">
        店铺 ID: <span id="currentShopIdDisplay">--</span><br>
        邀请码: <strong id="currentInviteCodeDisplay">--</strong>
      </div>
    </div>
  </div>

  <!-- 弹窗 -->
  <div class="modal-overlay" id="availEditModal">
    <div class="modal">
      <h3 id="availEditTitle">班次编辑</h3>
      <div class="avail-options">
        <label class="avail-opt">
          <input type="radio" name="availStatus" value="full" checked onchange="EmpAvail.onStatusChange()">
          <span>✓ 我可以全程上班</span>
        </label>
        <label class="avail-opt">
          <input type="radio" name="availStatus" value="partial" onchange="EmpAvail.onStatusChange()">
          <span>⏰ 我可以部分到岗</span>
        </label>
        <div id="partialTimeInputs" class="hidden partial-time">
          <div class="form-row">
            <div><label>最早到岗</label><input type="time" id="earliestArrival"></div>
            <div><label>最晚离岗</label><input type="time" id="latestDeparture"></div>
          </div>
          <p id="partialHint">有效到岗时长需 ≥ 最低要求</p>
        </div>
        <label class="avail-opt">
          <input type="radio" name="availStatus" value="unavailable" onchange="EmpAvail.onStatusChange()">
          <span>✗ 我无法上班</span>
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline btn-sm" onclick="EmpAvail.closeModal()">取消</button>
        <button class="btn btn-primary btn-sm" onclick="EmpAvail.saveCell()">确定</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="cantWorkModal">...</div>
  <div class="modal-overlay" id="editCellModal">...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
